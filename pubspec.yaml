name: nim_builder
description: AI App Builder powered by Nvidia NIM with Termux bridge
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # AI / Network
  http: ^1.2.1

  # Termux Bridge
  android_intent_plus: ^5.0.2

  # State Management
  flutter_riverpod: ^2.5.1

  # UI / Design
  flutter_animate: ^4.5.0
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  google_fonts: ^6.2.1

  # File System
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3

  # Database (Conversation memory)
  sqflite: ^2.3.3
  path: ^1.9.0

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  url_launcher: ^6.2.6

  # Image handling
  image_picker: ^1.1.2

  # Secure storage
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true