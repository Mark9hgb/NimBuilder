name: nim_builder
description: AI App Builder powered by Nvidia NIM with Termux bridge
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # AI / Network
  dart_openai: ^5.1.0
  http: ^1.2.1

  # Termux Bridge
  android_intent_plus: ^5.0.2
  flutter_services_binding: ^0.1.0

  # Terminal Emulation
  xterm:
    git:
      url: https://github.com/TerminalStudio/xterm.dart
      ref: main

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # UI / Design
  flutter_animate: ^4.5.0
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  google_fonts: ^6.2.1
  icons_plus: ^5.0.0

  # File System
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  file_picker: ^8.0.3

  # Database (Conversation memory)
  sqflite: ^2.3.3
  path: ^1.9.0

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  url_launcher: ^6.2.6
  permission_handler: ^11.3.1
  flutter_svg: ^2.0.10+1

  # Image handling
  image_picker: ^1.1.2
  image: ^4.2.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Code editor
  flutter_code_editor: ^0.3.2
  highlight: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true